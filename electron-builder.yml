appId: com.masamunet.dir-media-viewer
productName: Dir Media Viewer
directories:
  output: release
files:
  - build/**/*
  - dist-electron/**/*
  - package.json
mac:
  target: dmg
  category: public.app-category.utilities
  icon: build/favicon.png
dmg:
  contents:
    - x: 410
      y: 150
      type: link
      path: /Applications
    - x: 130
      y: 150
      type: file
